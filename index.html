<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonOn - Player de Mídia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            
            <div class="sidebar-header">
                <h1 class="logo">Neon<span class="accent">On</span></h1>
                <button class="btn-icon" id="btnToggleAutoplay" title="Autoplay">&#8635;</button>
            </div>
            
            <!-- Filtro de tipo de mídia -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">📱 Todos</button>
                <button class="filter-btn" data-filter="video">🎬 Vídeos</button>
                <button class="filter-btn" data-filter="image">🖼️ Imagens</button>
            </div>
            
            <div class="folder-select">
                <button class="btn-neon btn-full" id="btnSelectFolder">📁 Selecionar Pasta</button>
            </div>
            
            <ul class="video-list" id="videoList">
                <li class="empty-state">Nenhum arquivo carregado</li>
            </ul>
            
            <div class="sidebar-footer">
                <span class="counter" id="videoCounter"></span>
            </div>
        </aside>
        
        <!-- Player Area -->
        <main class="player-area">
            
            <div class="video-container" id="videoContainer">
                <!-- Elemento de vídeo -->
                <video id="videoPlayer" controls style="display: none;"></video>
                
                <!-- Elemento de imagem (novo!) -->
                <img id="imageViewer" style="display: none; max-width: 100%; max-height: 100%; object-fit: contain;">
                
                <div class="drop-overlay" id="dropOverlay">
                    <div class="drop-content">
                        <span class="drop-icon">▶</span>
                        <p>Arraste uma pasta de vídeos ou imagens</p>
                        <p class="drop-sub">ou clique em "Selecionar Pasta"</p>
                    </div>
                </div>
            </div>
            
            <div class="controls-bar">
                <button class="btn-icon" id="btnPrev" title="Anterior">◄</button>
                <button class="btn-icon btn-play" id="btnPlay" title="Play/Pause">▶</button>
                <button class="btn-icon" id="btnNext" title="Próximo">►</button>
                
                <!-- Controles específicos para imagem (zoom) -->
                <div class="image-controls" id="imageControls" style="display: none;">
                    <button class="btn-icon" id="btnZoomIn" title="Zoom +">🔍+</button>
                    <button class="btn-icon" id="btnZoomOut" title="Zoom -">🔍-</button>
                    <button class="btn-icon" id="btnResetZoom" title="Reset">⟳</button>
                </div>
                
                <div class="volume-control">
                    <span class="volume-icon">🔊</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="100">
                </div>
                
                <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                
                <button class="btn-icon" id="btnFullscreen" title="Tela Cheia">⛶</button>
            </div>
        </main>
    </div>
    
    <div class="credits-bar">
        <span class="credits-text">💜 Desenvolvido por Misa 💜</span>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
