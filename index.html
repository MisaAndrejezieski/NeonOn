<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonOn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Barra lateral -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">Neon<span class="accent">On</span></h1>
                <button class="btn-icon" id="btnToggleAutoplay" title="Autoplay">
                    &#8635;
                </button>
            </div>
            
            <div class="folder-select">
                <button class="btn-neon btn-full" id="btnSelectFolder">
                    &#128193; Selecionar Pasta
                </button>
            </div>
            
            <ul class="video-list" id="videoList">
                <li class="empty-state">Nenhum vídeo carregado</li>
            </ul>
            
            <div class="sidebar-footer">
                <span class="counter" id="videoCounter"></span>
            </div>
        </aside>
        
        <!-- Player -->
        <main class="player-area">
            <div class="video-container" id="videoContainer">
                <video id="videoPlayer" controls>
                    Seu navegador não suporta vídeo HTML5.
                </video>
                <div class="drop-overlay" id="dropOverlay">
                    <div class="drop-content">
                        <span class="drop-icon">&#9654;</span>
                        <p>Arraste arquivos ou pasta aqui</p>
                        <p class="drop-sub">ou clique em "Selecionar Pasta"</p>
                    </div>
                </div>
            </div>
            
            <div class="controls-bar">
                <button class="btn-icon" id="btnPrev" title="Anterior">&#9664;</button>
                <button class="btn-icon btn-play" id="btnPlay" title="Play/Pause">&#9654;</button>
                <button class="btn-icon" id="btnNext" title="Próximo">&#9654;</button>
                
                <div class="volume-control">
                    <span class="volume-icon">&#128266;</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="100">
                </div>
                
                <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                
                <button class="btn-icon" id="btnFullscreen" title="Tela Cheia">&#9974;</button>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
